services:
  - type: web
    name: agora-mujeres-api
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn server:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: agora_mujeres
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "https://agora-mujeres.expo.dev,https://*.expo.dev"
    region: oregon
    plan: free
