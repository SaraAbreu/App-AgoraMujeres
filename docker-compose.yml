version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agora-mujeres-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/agora_mujeres
      - DB_NAME=agora_mujeres
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
      - ENVIRONMENT=production
    depends_on:
      - mongo
    networks:
      - agora-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: agora-mujeres-db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=agora_mujeres
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - agora-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  agora-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
